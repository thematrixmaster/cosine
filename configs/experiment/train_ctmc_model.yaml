# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: plmr
  - override /data/dataset: ctmc
  - override /vocab: esm
  - override /callbacks: peint
  - override /model: ctmc
  - override /net: ctmc
  - override /trainer: gpu
  - override /logger: csv

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["plmr", "peint", "ctmc"]

seed: 12345

trainer:
  # min_epochs: 100
  max_epochs: null
  max_steps: 300000
  val_check_interval: 4000
  accumulate_grad_batches: 6
  check_val_every_n_epoch: null
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  precision: bf16

callbacks:
  model_checkpoint:
    monitor: val/loss/dataloader_idx_0
    mode: min
    every_n_train_steps: 4000
  lr_monitor:
    logging_interval: step
  early_stopping:
    monitor: val/loss/dataloader_idx_0
    mode: min
    patience: 50

vocab:
  alphabet:
    name: ESM-1b

model:
  compile: false
  weight_decay: 0.01
  optimizer:
    lr: 0.0003
  scheduler:
    num_warmup_steps: 2000

net:
  embed_x_per_chain: false
  ckpt_path: null

data:
  shuffle: true
  num_workers: 7
  batch_size: 16
  train_val_split: [0.95, 0.05]

logger:
  wandb:
    tags: ${tags}
