# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: plmr
  - override /data/dataset: pipet
  - override /vocab: esm
  - override /callbacks: default
  - override /model: peint
  - override /net: peint
  - override /trainer: gpu
  - override /logger: csv

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["plmr", "peint", "aa"]

seed: 12345

trainer:
  # min_epochs: 100
  max_epochs: null
  max_steps: 300000
  val_check_interval: 4000
  accumulate_grad_batches: 6
  check_val_every_n_epoch: null
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  precision: bf16

callbacks:
  model_checkpoint:
    monitor: val/loss/dataloader_idx_0
    mode: min
    every_n_train_steps: 5000
  lr_monitor:
    logging_interval: step
  early_stopping:
    monitor: val/loss/dataloader_idx_0
    mode: min
    patience: 50

model:
  compile: false
  weight_decay: 0.01
  optimizer:
    lr: 0.0004
  scheduler:
    num_warmup_steps: 2000

net:
  dropout_p: 0.0
  num_heads: 16
  num_encoder_layers: 3
  num_decoder_layers: 3
  use_chain_embedding: true
  causal_decoder: true
  enc_model:
    finetune: false
    embed_x_per_chain: true
    ckpt_path: null

data:
  shuffle: true
  num_workers: 8
  batch_size: 16
  train_val_split: [0.95, 0.05]
  dataset:
    embed_x_per_chain: ${net.enc_model.embed_x_per_chain}
    permute_chain_order: true
    random_token_prob: 0.1
    leave_unmasked_prob: 0.1
    mask_prob: 0.15

logger:
  wandb:
    tags: ${tags}
