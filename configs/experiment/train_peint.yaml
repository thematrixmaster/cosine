# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: plmr
  - override /data/dataset: pipet
  - override /data/dataset@data.dataset_val: dms
  - override /vocab: esm
  - override /callbacks: default
  - override /callbacks: grad_norm
  - override /callbacks: val_likelihood
  - override /metrics: koenig_dms
  - override /model: peint
  - override /net: peint
  - override /trainer: gpu
  - override /logger: csv

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["plmr", "peint"]

seed: 12345

trainer:
  # min_epochs: 100
  max_epochs: null
  max_steps: 300000
  val_check_interval: 4000
  accumulate_grad_batches: 6
  check_val_every_n_epoch: null
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  precision: bf16

callbacks:
  model_checkpoint:
    monitor: val/loss/dataloader_idx_0
    mode: min
    every_n_train_steps: 5000
  lr_monitor:
    logging_interval: step
  early_stopping:
    monitor: val/loss/dataloader_idx_0
    mode: min
    patience: 50

vocab:
  alphabet:
    name: ESM-1b

model:
  compile: false
  weight_decay: 0.01
  optimizer:
    lr: 0.0003
  scheduler:
    num_warmup_steps: 2000

net:
  dropout_p: 0.0
  finetune_esm: false
  num_heads: 20
  num_encoder_layers: 3
  num_decoder_layers: 3
  ckpt_path: null
  chain_break_token: .
  encoder_self_attn_type: full  # full, intra_inter, intra_only
  decoder_self_attn_type: full
  embed_x_per_chain: false

data:
  num_workers: 0
  batch_size: 16
  train_val_split: [0.95, 0.05]
  dataset:
    sep_token: ${net.chain_break_token}
    embed_x_per_chain: ${net.embed_x_per_chain}
  dataset_val:
    sep_token: ${net.chain_break_token}
    embed_x_per_chain: ${net.embed_x_per_chain}
    dataset:
      data_file: ${paths.data_dir}/wyatt/dms/mut_joint_pipet.txt

logger:
  wandb:
    tags: ${tags}
