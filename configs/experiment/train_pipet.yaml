# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: plmr
  - override /data/dataset: pipet
  - override /vocab: esm
  - override /callbacks: default
  - override /callbacks: grad_norm
  - override /callbacks: val_likelihood
  - override /metrics: none
  - override /model: pipet
  - override /net: pipet
  - override /trainer: gpu
  - override /logger: csv

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["plmr", "pipet"]

seed: 12345

trainer:
  # min_epochs: 100
  max_epochs: null
  max_steps: 300000
  val_check_interval: 4000
  accumulate_grad_batches: 6
  check_val_every_n_epoch: null
  gradient_clip_val: 1.0
  log_every_n_steps: 1
  precision: bf16

callbacks:
  model_checkpoint:
    monitor: val/loss
    mode: min
    every_n_train_steps: 4000
  lr_monitor:
    logging_interval: step
  early_stopping:
    monitor: val/loss
    mode: min
    patience: 50

vocab:
  alphabet:
    name: ESM-1b

model:
  compile: false
  weight_decay: 0.01
  optimizer:
    lr: 0.0003
  scheduler:
    num_warmup_steps: 2000

net:
  dropout_p: 0.0
  use_attention_bias: true
  finetune_esm: false
  num_heads: 20
  num_encoder_layers: 3
  num_decoder_layers: 3
  chain_break_token: .
  decoder_self_attn_type: intra_inter

data:
  batch_size: 16

logger:
  wandb:
    tags: ${tags}
