defaults:
  - dataset: fasta
  - dataset@dataset_train: none
  - dataset@dataset_val: none
  - dataset@dataset_test: none
  - _self_

_target_: peint.data.datamodule.PLMRDataModule

batch_size: 64 # Needs to be divisible by the number of devices (e.g., if in a distributed setup)
generator_seed: 42
train_val_split: [0.95, 0.05]
num_workers: 0
pin_memory: false
shuffle: false
