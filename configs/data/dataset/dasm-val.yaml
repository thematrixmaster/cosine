_target_: peint.data.datasets.peint.EncodedPEINTDataset

dataset:
  _target_: torch.utils.data.ConcatDataset
  datasets:
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/dasm/edges/val/v1jaffePairedCC.txt
      sep_token: .
      min_t: 0.0
      chain_id_offset: 1
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/dasm/edges/val/v1tangCC.txt
      sep_token: .
      min_t: 0.0
      chain_id_offset: 1
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/dasm/edges/val/v1vanwinkleheavyTrainCC.txt
      sep_token: .
      min_t: 0.0
      chain_id_offset: 1
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/dasm/edges/val/v1vanwinklelightTrainCC1m.txt
      sep_token: .
      min_t: 0.0
      chain_id_offset: 2

sep_token: .
vocab: ${vocab}
mask_prob: 0.15
random_token_prob: 0.0
leave_unmasked_prob: 0.0
embed_x_per_chain: true
permute_chain_order: true
