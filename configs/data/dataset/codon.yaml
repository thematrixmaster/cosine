_target_: peint.data.datasets.codon.CodonDataset

dataset:
  _target_: torch.utils.data.ConcatDataset
  datasets:
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/wyatt/subs/edges_joint/nt/d1.txt
      sep_token: .
      min_t: 0.0
      chain_id_offset: 1
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/wyatt/subs/edges_joint/nt/d2.txt
      sep_token: .
      min_t: 0.0
      chain_id_offset: 1
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/wyatt/subs/edges_joint/nt/d3.txt
      sep_token: .
      min_t: 0.0
      chain_id_offset: 1

vocab: ${vocab}
mask_prob: 0.15
random_token_prob: 0.1
leave_unmasked_prob: 0.1
embed_x_per_chain: true
permute_chain_order: true
