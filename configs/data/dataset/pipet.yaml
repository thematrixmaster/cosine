_target_: peint.data.datasets.peint.EncodedPEINTDataset

dataset:
  _target_: torch.utils.data.ConcatDataset
  datasets:
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/wyatt/all/edges_joint_pipet/d1.txt
      sep_token: .
      min_t: 5e-3
      chain_id_offset: 1
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/wyatt/all/edges_joint_pipet/d2.txt
      sep_token: .
      min_t: 5e-3
      chain_id_offset: 1
    - _target_: evo.dataset.ComplexCherriesDataset
      data_file: ${paths.data_dir}/wyatt/all/edges_joint_pipet/d3.txt
      sep_token: .
      min_t: 5e-3
      chain_id_offset: 1

sep_token: .
vocab: ${vocab}
mask_prob: 0.15
random_token_prob: 0.0
leave_unmasked_prob: 0.0
embed_x_per_chain: false
